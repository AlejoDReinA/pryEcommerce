<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="..\style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="icon" href="..\Imagenes\shop.svg">
    <title>Tienda gamer - Iniciar sesión</title>
</head>
<body data-bs-theme="dark">
    <header>
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <!--agregar titulo e icono al navbar-->
                <a href="..\index.html" class="navbar-brand"> 
                    <img src="..\Imagenes\shop.svg" alt="logo" width="30" height="24">
                    Tienda gamer
                </a>
                
                <a href="#" class="btn btn-dark ms-auto"><i class="bi bi-cart3"></i></a>    
                <a href="#" class="btn btn-danger"><i class="bi bi-box-arrow-right"></i></a>
            </div>
        </nav>
        
    </header>
    <main>
        <div class="container-md">
            <div class="card mt-4">
                <h5 class="card-header">Inicio de sesión</h4>
                <div class="card-body"> 
                    <form action="..\index.html" method="">
                        <input type="email" class="form-control mb-3" name="email" placeholder="Email" required>
                        <input type="password" class="form-control mb-3" name="pass"  placeholder="Contraseña" required>

                        <div class="d-flex align-items-center gap-2">
                            <input type="submit" class="btn btn-primary w-25" value="Ingresar">
                            <p class="text mt-3">No tenés una cuenta?</p>
                            <a href="registro.html"> Registrate aquí</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>
    
    <!--zona de scripts-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
