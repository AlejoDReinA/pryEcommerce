<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="..\styles\style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="icon" href="..\imagenes\shop.svg">
    <title>Tienda gamer - Carrito</title>
</head>
<body data-bs-theme="dark">
    <header>
        
        <nav class="navbar navbar-expand-lg">
            <div class="container-fluid">
                <!--agregar titulo e icono al navbar-->
                <a href="../../index.html" class="navbar-brand"> 
                    <img src="../../imagenes/shop.svg" alt="logo" width="30" height="24">
                    Tienda gamer
                </a>
                <!--agregar barra de busqueda-->
                <form class="d-flex w-50 ms-auto" role="search">
                    <div class="input-group">
                        <input class="form-control" type="search" placeholder="Buscar producto" aria-label="search">
                        <!--agregar icono de lupa-->
                        <span class="input-group-text">
                            <i class="bi bi-search"></i>
                        </span>
                    </div>
                </form>
                <a href="./auth/login.html" class="btn btn-success ms-auto"> <i class="bi bi-box-arrow-in-left"></i></a>    
                <a href="#" class="btn btn-danger"><i class="bi bi-box-arrow-right"></i></a>
            </div>
        </nav>
    </header>
    <main>
        <div class="d-flex align-items-center">
            <h2 class="subtitle mx-3">Carrito de compras</h2>
            <hr class="flex-grow-1 me-3">
        </div>
        <div class="container-md mt-3">

            <div id="carritoContainer"></div>

            <div class="card mt-3">
                <div class="card-footer d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Total:</h5>
                    <h5 class="mb-0 price" id="totalCarrito">$0</h5>
                    <div class="d-flex justify-content-end">
                        <button id="btnComprar" class="btn btn-success d-none">
                            <i class="bi bi-bag-check"></i> Comprar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <!--zona de scripts-->
    <script type="module" src="carrito.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
